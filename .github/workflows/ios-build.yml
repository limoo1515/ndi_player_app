name: "MIMO_NDI iOS Cloud Build"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4
        with:
          lfs: false # On désactive LFS pour ne pas dépasser le quota

      - name: "Installer Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "Télécharger & Extraire l'Apple SDK NDI (Bypass LFS)"
        run: |
          mkdir -p ios/NDISDK/lib
          mkdir -p /tmp/ndi_sdk
          
          echo "Téléchargement du SDK NDI pour iOS..."
          # Lien direct vers le SDK NDI pour iOS
          curl -L "http://ndi.link/NDISDK_iOS" -o /tmp/ndi_sdk/ndi_sdk.pkg
          
          echo "Expansion du paquet..."
          pkgutil --expand-full /tmp/ndi_sdk/ndi_sdk.pkg /tmp/ndi_sdk/expanded
          
          # Extraction de la librairie libndi_ios.a vers le dossier de build
          find /tmp/ndi_sdk/expanded -name "libndi_ios.a" -exec cp {} ios/NDISDK/lib/ \;
          
          echo "Vérification de la présence de libndi_ios.a :"
          ls -lh ios/NDISDK/lib/libndi_ios.a

      - name: "Installer les dépendances Flutter"
        run: |
          flutter config --enable-ios
          flutter create . --platforms=ios
          # On restaure les fichiers que flutter create aurait pu écraser
          git checkout ios/Podfile
          git checkout ios/configure_xcode.rb
          flutter pub get
          # Génération des icônes et de l'écran d'accueil
          dart run flutter_launcher_icons:main || echo "Icon generation failed"
          dart run flutter_native_splash:create || echo "Splash generation failed"

      - name: "Pré-installation CocoaPods"
        run: |
          cd ios
          pod install || echo "Initialisation des structures"

      - name: "Configurer Xcode pour l'SDK NDI via Ruby"
        run: |
          sudo gem install xcodeproj
          cd ios
          ruby configure_xcode.rb

      - name: "Finaliser les CocoaPods"
        run: |
          cd ios
          pod install --repo-update

      - name: "Générer l'IPA (Non signé)"
        run: |
          flutter build ios --release --no-codesign --verbose
          
          # Préparation de l'archive
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r MIMO_NDI.ipa Payload

      - name: "Exporter l'Application iOS (.ipa)"
        uses: actions/upload-artifact@v4
        with:
          name: mimo-ndi-build
          path: build/ios/iphoneos/MIMO_NDI.ipa

