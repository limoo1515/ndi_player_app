name: "MIMO_NDI Android Cloud Build"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: "Installer Java"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: "Installer Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "Installer NDK"
        run: |
          sudo ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"

      - name: "Vérifier la présence du SDK (Local)"
        run: |
          echo "Vérification des fichiers locaux Android NDI..."
          ls -R android/app/src/main/jniLibs/ || echo "Dossier jniLibs non trouvé"
          ls -R ios/NDISDK/include/ || echo "Dossier include non trouvé"


      - name: "Installer les dépendances Flutter"
        run: flutter pub get

      - name: "Fix Gradle Permissions"
        run: chmod +x android/gradlew

      - name: "Générer l'APK (Release)"
        run: |
          # On indique le chemin du NDK pour que Flutter le trouve sans erreur
          export ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.1.8937393
          # --no-shrink est recommandé si le stripping réduit trop la taille ou casse le SDK
          flutter build apk --release --no-shrink --verbose

      - name: "Exporter l'APK (.apk)"
        uses: actions/upload-artifact@v4
        with:
          name: mimo-ndi-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
