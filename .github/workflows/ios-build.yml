name: "MIMO_NDI iOS Cloud Build (LFS)"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: "Checkout Code (LFS)"
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: "Installer Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "Recréer le binaire NDI (.a) à partir des morceaux"
        run: |
          echo "Reconstruction de libndi_ios.a..."
          cd ios/NDISDK/lib
          cat libndi_ios.a.part* > libndi_ios.a || echo "Pas de morceaux trouvés."
          ls -lh libndi_ios.a
          cd ../../..

      - name: "Vérification des fichiers SDK NDI"
        run: |
          ls -lh ios/NDISDK/lib/
          ls -lh ios/NDISDK/include/
          [ -f ios/NDISDK/lib/libndi_ios.a ] && echo "✅ libndi_ios.a est PRÊT" || (echo "❌ libndi_ios.a MANQUANT" ; exit 1)

      - name: "Installer les dépendances Flutter"
        run: |
          flutter config --enable-ios
          flutter pub get
          flutter create --platforms=ios . || true
          dart run flutter_launcher_icons:main || echo "Icon generation failed"
          dart run flutter_native_splash:create || echo "Splash generation failed"

      - name: "Configurer Xcode pour NDI"
        run: |
          sudo gem install xcodeproj
          cd ios
          ruby configure_xcode.rb

      - name: "Installation CocoaPods"
        run: |
          cd ios
          pod install --repo-update

      - name: "Générer l'IPA (Non signé)"
        run: |
          flutter build ios --release --no-codesign --verbose
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r MIMO_NDI.ipa Payload

      - name: "Exporter l'IPA (.ipa)"
        uses: actions/upload-artifact@v4
        with:
          name: mimo-ndi-ipa
          path: build/ios/iphoneos/MIMO_NDI.ipa
