name: "MIMO_NDI iOS Cloud Build"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: "Installer Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: "Vérifier la présence du SDK (Local)"
        run: |
          echo "Vérification des fichiers locaux..."
          ls -R ios/NDISDK/lib/
          ls -R ios/NDISDK/include/ || echo "Dossier include non trouvé"


      - name: "Installer les dépendances Flutter"
        run: |
          flutter config --enable-ios
          flutter pub get
          
          # Générer le projet Xcode manquant (Runner.xcodeproj)
          flutter create --platforms=ios . || true
          
          # Tentative de génération d'icônes et splash (silencieux si ça échoue)
          dart run flutter_launcher_icons:main || echo "Icon generation failed, using defaults"
          dart run flutter_native_splash:create || echo "Splash generation failed, using defaults"

      - name: "Configurer Xcode pour NDI"
        run: |
          sudo gem install xcodeproj
          cd ios
          # Ce script ajoute les frameworks et lie la libndi_ios.a au projet Runner
          ruby configure_xcode.rb

      - name: "Installation CocoaPods"
        run: |
          cd ios
          pod install --repo-update

      - name: "Générer l'IPA (Non signé)"
        run: |
          # Construction du package iOS en mode Release
          flutter build ios --release --no-codesign --verbose
          
          # Préparation de l'archive IPA pour le téléchargement
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r MIMO_NDI.ipa Payload

      - name: "Exporter l'IPA (.ipa)"
        uses: actions/upload-artifact@v4
        with:
          name: mimo-ndi-ipa
          path: build/ios/iphoneos/MIMO_NDI.ipa
